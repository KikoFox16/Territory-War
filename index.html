// --- SYSTÈME D'AMIS ET ÉCHANGE ---
const friendsBtn = document.getElementById('friends-toggle-btn');
const friendsScreen = document.getElementById('friends-screen');
const tradeScreen = document.getElementById('trade-screen');

friendsBtn.onclick = () => friendsScreen.classList.remove('hidden');
document.getElementById('close-friends').onclick = () => friendsScreen.classList.add('hidden');

// Envoyer une demande par PSEUDO
document.getElementById('send-friend-req').onclick = async () => {
    const targetUsername = document.getElementById('add-friend-uid').value.trim();
    console.log("Tentative d'envoi à :", targetUsername);

    if (!targetUsername) return;
    if (targetUsername === myUser.username) {
        alert("Tu ne peux pas t'ajouter toi-même !");
        return;
    }

    // On cherche l'UID dans la liste locale des utilisateurs
    const targetEntry = Object.entries(allUsers).find(([uid, user]) => 
        user.username && user.username.toLowerCase() === targetUsername.toLowerCase()
    );

    if (!targetEntry) {
        alert("Utilisateur '" + targetUsername + "' introuvable. Vérifie l'orthographe !");
        return;
    }

    const targetUid = targetEntry[0];

    try {
        await set(ref(db, `requests/${targetUid}/${myUser.uid}`), {
            from: myUser.username,
            fromUid: myUser.uid,
            timestamp: Date.now()
        });
        alert("Demande envoyée à " + targetUsername + " !");
        document.getElementById('add-friend-uid').value = "";
    } catch (error) {
        console.error("Erreur Firebase :", error);
        alert("Erreur lors de l'envoi.");
    }
};



// Écouter les demandes et les amis
function listenToFriends() {
    // Demandes entrantes
    onValue(ref(db, `requests/${myUser.uid}`), (snap) => {
        const reqs = snap.val();
        const container = document.getElementById('friends-requests');
        container.innerHTML = reqs ? "<h4>Demandes :</h4>" : "";
        if (reqs) {
            Object.keys(reqs).forEach(fromUid => {
                const r = reqs[fromUid];
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `<span>${r.from}</span>
                    <div>
                        <button style="padding:5px; margin:0; width:auto; background:#2ecc71;" onclick="acceptFriend('${fromUid}', '${r.from}')">✔</button>
                        <button style="padding:5px; margin:0; width:auto; background:#e74c3c;" onclick="refuseFriend('${fromUid}')">X</button>
                    </div>`;
                container.appendChild(div);
            });
        }
    });

    // Liste d'amis
    onValue(ref(db, `friends/${myUser.uid}`), (snap) => {
        const friends = snap.val();
        const container = document.getElementById('friends-list');
        container.innerHTML = friends ? "<h4>Tes Amis :</h4>" : "<p>Aucun ami.</p>";
        if (friends) {
            Object.keys(friends).forEach(fUid => {
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.innerHTML = `<span>${friends[fUid].name}</span>
                    <button style="padding:5px; margin:0; width:auto;" onclick="initiateTrade('${fUid}', '${friends[fUid].name}')">🤝 Échanger</button>`;
                container.appendChild(div);
            });
        }
    });
}

// Fonctions globales pour les boutons (Window)
window.acceptFriend = async (fUid, fName) => {
    const updates = {};
    updates[`friends/${myUser.uid}/${fUid}`] = { name: fName };
    updates[`friends/${fUid}/${myUser.uid}`] = { name: myUser.username };
    updates[`requests/${myUser.uid}/${fUid}`] = null; // Supprime la demande
    
    await update(ref(db), updates);
    alert("Ami ajouté !");
};

window.refuseFriend = async (fUid) => {
    await set(ref(db, `requests/${myUser.uid}/${fUid}`), null);
};

// --- SYSTÈME DE TRADE ---
let currentTradeId = null;
let tradeTimer = null;

window.initiateTrade = async (partnerUid, partnerName) => {
    currentTradeId = myUser.uid < partnerUid ? `${myUser.uid}_${partnerUid}` : `${partnerUid}_${myUser.uid}`;
    
    // Remplir le sélecteur de zones
    const zoneSelect = document.getElementById('trade-my-zone');
    zoneSelect.innerHTML = '<option value="">-- Aucune zone --</option>';
    Object.keys(allZones).filter(id => allZones[id].ownerId === myUser.uid).forEach(id => {
        zoneSelect.innerHTML += `<option value="${id}">Zone ${id}</option>`;
    });

    document.getElementById('trade-partner-name').innerText = partnerName;
    friendsScreen.classList.add('hidden');
    tradeScreen.classList.remove('hidden');

    // Écouter l'état du trade
    onValue(ref(db, `trades/${currentTradeId}`), (snap) => {
        const trade = snap.val();
        if (!trade) return;

        const partnerData = trade[partnerUid] || {};
        document.getElementById('partner-offer').innerHTML = `
            Coins: ${partnerData.coins || 0}<br>
            Zone: ${partnerData.zoneId || 'Aucune'}<br>
            Statut: ${partnerData.ready ? '✅ PRÊT' : '⏳ Choix...'}`;

        // Si les deux sont prêts, compte à rebours
        if (trade[myUser.uid]?.ready && trade[partnerUid]?.ready) {
            startTradeCountdown();
        } else {
            stopTradeCountdown();
        }
    });
};

document.getElementById('accept-trade').onclick = async () => {
    const coins = parseInt(document.getElementById('trade-my-coins').value) || 0;
    const zoneId = document.getElementById('trade-my-zone').value;

    if (coins > myUser.coins) return alert("Pas assez de pièces !");

    await update(ref(db, `trades/${currentTradeId}/${myUser.uid}`), {
        coins, zoneId, ready: true
    });
};

function startTradeCountdown() {
    let count = 5;
    const status = document.getElementById('trade-status');
    if (tradeTimer) return;

    tradeTimer = setInterval(async () => {
        status.innerText = `CONFIRMATION DANS ${count}s...`;
        if (count <= 0) {
            clearInterval(tradeTimer);
            await finalizeTrade();
        }
        count--;
    }, 1000);
}

async function finalizeTrade() {
    const snap = await get(ref(db, `trades/${currentTradeId}`));
    const trade = snap.val();
    const partnerUid = Object.keys(trade).find(id => id !== myUser.uid);
    
    // Logique de transfert ici (similaire à buyZone mais sans shop)
    // ... Mise à jour des coins et zones pour les deux joueurs ...
    
    await set(ref(db, `trades/${currentTradeId}`), null); // Nettoyage
    tradeScreen.classList.add('hidden');
    alert("Échange réussi !");
}
    
    
function startGame() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');

    initMap();
    listenToDatabase();
    startGPS();
    
    // AJOUTE CETTE LIGNE ICI :
    listenToFriends(); 

    setTimeout(() => {
        offlineIncomeCheck();
    }, 2000);

    incomeInterval = setInterval(collectIncome, INCOME_INTERVAL_MS);
    updateHUD();
}


async function offlineIncomeCheck() {
    if (!myUser.uid || !myUser.lastIncomeTime) return;

    const now = Date.now();
    const diffMs = now - myUser.lastIncomeTime;
    
    if (diffMs >= INCOME_INTERVAL_MS) {
        const intervalsPassed = Math.floor(diffMs / INCOME_INTERVAL_MS);
        
        let myZones = Object.values(allZones).filter(z => z.ownerId === myUser.uid);
        
        if (myZones.length > 0) {
            let dailyIncome = myZones.reduce((acc, z) => acc + 2 + (((z.level||1) - 1) * 3), 0);
            let totalOfflineIncome = dailyIncome * intervalsPassed;

            if (totalOfflineIncome > 0) {
                alert(`💰 RÉCOLTE QUOTIDIENNE : +${totalOfflineIncome} pièces pour vos ${intervalsPassed} jour(s) de domination !`);
                
                const updates = {};
                updates[`users/${myUser.uid}/coins`] = (myUser.coins || 0) + totalOfflineIncome;
                updates[`users/${myUser.uid}/lastIncomeTime`] = now - (diffMs % INCOME_INTERVAL_MS); 
                
                await update(ref(db), updates);
            }
        }
    }
}



        function initMap() {
            map = L.map('map', { zoomControl: false, interactive: true }).setView([playerPos.lat, playerPos.lng], 17);
            const tileUrl = 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png';

            L.tileLayer(tileUrl, {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            const hour = new Date().getHours();
            if (hour >= 21 || hour < 6) {
                document.body.classList.add('night-mode');
            }

            const icon = L.divIcon({ className: 'custom-div-icon', html: `<div class='player-marker' style='border-color: ${myUser.color}'></div>`, iconSize: [16, 16], iconAnchor: [8, 8] });
            playerMarker = L.marker([playerPos.lat, playerPos.lng], {icon: icon}).addTo(map);
                
map.on('click', () => {
    selectedZoneId = null;
    checkCurrentZoneContext();
});

        }

        function listenToDatabase() {
            onValue(ref(db, `users/${myUser.uid}`), (snapshot) => {
                if(snapshot.exists()) {
                    myUser = { uid: myUser.uid, ...snapshot.val() };
                    updateHUD();
                }
            });

            onValue(ref(db, 'users'), (snapshot) => {
    if(snapshot.exists()) {
        allUsers = snapshot.val();
        updateLeaderboard();
        updateZoneColors();

        // On récupère la liste des IDs de toutes tes zones + leurs voisines
        const myControlledArea = new Set();
        Object.keys(allZones).forEach(zId => {
            if (allZones[zId].ownerId === myUser.uid) {
                myControlledArea.add(zId); // Ta zone
                
                // On ajoute les 8 zones voisines (le radar s'étend d'une case autour)
                const parts = zId.split('_');
                const lat = parseInt(parts[0]);
                const lng = parseInt(parts[1]);
                
                for (let x = -1; x <= 1; x++) {
                    for (let y = -1; y <= 1; y++) {
                        myControlledArea.add(`${lat + x}_${lng + y}`);
                    }
                }
            }
        });

        Object.keys(allUsers).forEach(uid => {
            if (uid === myUser.uid) return; 

            const user = allUsers[uid];
            if (user.lat && user.lng && (Date.now() - user.lastSeen < 300000)) {
                
                const userZoneId = getZoneIdFromLatLng(user.lat, user.lng);
                const dist = getDistance(playerPos.lat, playerPos.lng, user.lat, user.lng);
                
                // CONDITION DE VISIBILITÉ : 
                // Soit il est à moins de 10km (ton radar personnel)
                // Soit il est dans/à côté d'un de tes territoires (ton réseau de surveillance)
                const isVisible = (dist <= 10) || myControlledArea.has(userZoneId);

                if (isVisible) { 
                    if (!otherPlayersMarkers[uid]) {
                        const otherIcon = L.divIcon({ 
                            className: 'custom-div-icon', 
                            html: `<div class='player-marker' style='border-color: ${user.color}; background-color: rgba(255,255,255,0.7)'></div>`, 
                            iconSize: [12, 12], 
                            iconAnchor: [6, 6] 
                        });
                        otherPlayersMarkers[uid] = L.marker([user.lat, user.lng], {icon: otherIcon})
                            .addTo(map)
                            .bindTooltip(user.username, {permanent: false, direction: 'top'});
                    } else {
                        otherPlayersMarkers[uid].setLatLng([user.lat, user.lng]);
                    }
                } else {
                    if (otherPlayersMarkers[uid]) {
                        map.removeLayer(otherPlayersMarkers[uid]);
                        delete otherPlayersMarkers[uid];
                    }
                }
            } else {
                if (otherPlayersMarkers[uid]) {
                    map.removeLayer(otherPlayersMarkers[uid]);
                    delete otherPlayersMarkers[uid];
                }
            }
        });

        function getZoneIdFromLatLng(lat, lng) {
            const latIdx = Math.floor(lat / GRID_STEP_LAT);
            const lngIdx = Math.floor(lng / GRID_STEP_LNG);
            return `${latIdx}_${lngIdx}`;
        }

        function getBoundsFromZoneId(zoneId) {
            const parts = zoneId.split('_');
            const latIdx = parseInt(parts[0]);
            const lngIdx = parseInt(parts[1]);
            return [
                [latIdx * GRID_STEP_LAT, lngIdx * GRID_STEP_LNG], 
                [(latIdx + 1) * GRID_STEP_LAT, (lngIdx + 1) * GRID_STEP_LNG] 
            ];
        }

function renderZonesMap() {
    // SI on explore, on ne nettoie pas la carte pour éviter que les zones disparaissent
    if (isExploring) return; 

    Object.values(zoneRectangles).forEach(rect => map.removeLayer(rect));
    zoneRectangles = {};

    if (!playerPos) return;

    // Afficher mes zones
    Object.keys(allZones).forEach(zId => {
        const zone = allZones[zId];
        if (zone.ownerId === myUser.uid) {
            createZoneRectangle(zId, zone);
        }
    });

    const pLatIdx = Math.floor(playerPos.lat / GRID_STEP_LAT);
    const pLngIdx = Math.floor(playerPos.lng / GRID_STEP_LNG);
    const range = 20; 

    for (let i = -range; i <= range; i++) {
        for (let j = -range; j <= range; j++) {
            const zId = `${pLatIdx + i}_${pLngIdx + j}`;
            if (zoneRectangles[zId]) continue;
            createZoneRectangle(zId, allZones[zId]);
        }
    }
}


function createZoneRectangle(zId, zone) {
    const bounds = getBoundsFromZoneId(zId);
    
    let style = {
        color: '#aaa',
        weight: 1,
        fillOpacity: 0.05,
        interactive: true
    };

    if (zone) {
        const owner = allUsers[zone.ownerId];
        const protection = getProtectionStatus(zone);
        
        style.color = owner ? owner.color : '#555';
        style.weight = zone.level ? zone.level * 2 : 2;
        style.fillOpacity = zone.forSale ? 0.6 : 0.3;
        
        // Style spécifique si c'est ma zone
        if (zone.ownerId === myUser.uid) {
            style.weight = (zone.level || 1) * 3;
            style.fillOpacity = 0.5;
        }

        // --- STYLE DE PROTECTION (BOUCLIER) ---
        if (protection.active) {
            style.color = "#f1c40f"; // Couleur Or
            style.weight = (zone.level || 1) * 5; // Bordure beaucoup plus épaisse
            style.dashArray = null; // Désactive les pointillés même si en vente
        } else if (zone.forSale) {
            style.dashArray = '5, 5'; // Pointillés pour la vente si non protégé
        }
    }

    const rect = L.rectangle(bounds, style).addTo(map);
    zoneRectangles[zId] = rect;

    rect.on('click', (e) => {
        L.DomEvent.stopPropagation(e);
        selectZone(zId);
    });
}

window.goToZone = (id) => {

        function captureTick() {
    const zone = allZones[currentZoneId];
            
    // VERIFICATION PROTECTION
    const protection = getProtectionStatus(zone);
    if (protection.active) {
        document.getElementById('capture-bar-fill').style.width = '0%';

        document.getElementById('capture-text').innerText = "🛡️ ZONE PROTÉGÉE";
        return; // On arrête là, le timer ne monte pas
    }        
            
    const isMine = zone && zone.ownerId === myUser.uid;
    
    if (isMine) {
        document.getElementById('capture-bar-fill').style.width = '100%';
        document.getElementById('capture-bar-fill').style.backgroundColor = '#2ecc71';
        document.getElementById('capture-text').innerText = "Territoire sécurisé";
        return;
    }

    // --- CALCUL DU TEMPS DYNAMIQUE ---
    let targetTime = TIME_FREE; // Par défaut 60s pour zone libre

    if (zone) {
        const lvl = zone.level || 1;
        if (lvl === 1) targetTime = 300;       // 5 min
        else if (lvl === 2) targetTime = 600;  // 10 min
        else if (lvl === 3) targetTime = 1200; // 20 min
        else if (lvl >= 4) targetTime = 1800;  // 30 min
    }
    // ---------------------------------

    captureTimer++;

    let percent = (captureTimer / targetTime) * 100;
    document.getElementById('capture-bar-fill').style.width = `${percent}%`;
    document.getElementById('capture-bar-fill').style.backgroundColor = zone ? '#e74c3c' : '#3498db';
    
    // Formatage du texte pour afficher minutes:secondes
    const minutes = Math.floor((targetTime - captureTimer) / 60);
    const seconds = Math.floor((targetTime - captureTimer) % 60);
    const timeString = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    
    document.getElementById('capture-text').innerText = `Capture : ${timeString}`;

    if (captureTimer >= targetTime) {
        clearInterval(captureInterval);
        captureZone(currentZoneId, zone);
    }
}

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

            if (currentLevel === 3) return 100;

        async function buyZone(zoneId, zoneData) {
            if (myUser.coins < zoneData.price) return;

            const updates = {};
            updates[`users/${myUser.uid}/coins`] = myUser.coins - zoneData.price;
            updates[`users/${myUser.uid}/zonesCount`] = (myUser.zonesCount || 0) + 1;
            
            const seller = allUsers[zoneData.ownerId];
            if (seller) {
                updates[`users/${zoneData.ownerId}/coins`] = (seller.coins || 0) + zoneData.price;
                updates[`users/${zoneData.ownerId}/zonesCount`] = Math.max(0, (seller.zonesCount || 1) - 1);
            }

            updates[`zones/${zoneId}/ownerId`] = myUser.uid;
            updates[`zones/${zoneId}/forSale`] = false;
            updates[`zones/${zoneId}/price`] = 0;

            alert("Zone achetée avec succès !");

const PROTECTION_PLANS = [
    { id: '1d', label: '1 Jour', duration: 86400000, cost: 50 },

async function protectZone(zoneId, plan) {
    if (myUser.coins < plan.cost) {
        alert("Pas assez de pièces !");
        return;
    }

    const now = Date.now();
    // On ajoute au temps actuel (ou au temps d'expiration restant si déjà protégé)
    const currentExpiry = (allZones[zoneId] && allZones[zoneId].protectionExpiry) || now;
    const baseTime = Math.max(now, currentExpiry);
    const newExpiry = baseTime + plan.duration;

    const updates = {};
    updates[`users/${myUser.uid}/coins`] = myUser.coins - plan.cost;
    updates[`zones/${zoneId}/protectionExpiry`] = newExpiry;

    await update(ref(db), updates);
    alert(`Bouclier activé jusqu'au ${new Date(newExpiry).toLocaleDateString()} !`);
}

// Fonction utilitaire pour vérifier si une zone est protégée
function getProtectionStatus(zone) {
    if (!zone || !zone.protectionExpiry) return { active: false };
    const remaining = zone.protectionExpiry - Date.now();
    return {
        active: remaining > 0,
        remaining: remaining,
        date: new Date(zone.protectionExpiry).toLocaleString()
    };
}

<div id="shop-screen" class="screen hidden" style="z-index: 3000;">
    <div class="panel" style="width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; pointer-events: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin:0;">Marché Mondial</h2>
            <button id="close-shop" style="width: auto; padding: 5px 15px; margin: 0; background: #e74c3c;">X</button>
        </div>

        <div style="margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
            <select id="shop-sort" style="padding: 8px; border-radius: 5px; background: #222; color: white; border: 1px solid #444;">
                <option value="price_asc">Prix croissant</option>
                <option value="price_desc">Prix décroissant</option>
                <option value="level_asc">Niveau croissant</option>
                <option value="level_desc">Niveau décroissant</option>
            </select>
        </div>

        <div id="shop-list" style="display: flex; flex-direction: column; gap: 10px;">
            </div>
    </div>
</div>

<button id="friends-toggle-btn" title="Amis">👥</button>

<div id="friends-screen" class="screen hidden" style="z-index: 3100;">
    <div class="panel" style="width: 90%; max-width: 400px; max-height: 80vh; overflow-y: auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin:0;">Amis & Requêtes</h2>
            <button id="close-friends" style="width: auto; padding: 5px 15px; margin: 0; background: #e74c3c;">X</button>
        </div>
        <div id="friends-requests" style="border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px;">
            </div>
        <div id="friends-list">
            </div>
        <div style="margin-top:15px; border-top: 1px solid #444; padding-top: 10px;">
            <input type="text" id="add-friend-uid" placeholder="Pseudo de l'ami" style="width:80%; font-size:0.9rem;">
            <button id="send-friend-req" style="width:100%; font-size:0.9rem;">Envoyer Demande</button>
        </div>
    </div>
</div>

<div id="trade-screen" class="screen hidden" style="z-index: 3200;">
    <div class="panel" style="width: 90%; max-width: 450px;">
        <h3>🤝 Échange avec <span id="trade-partner-name">...</span></h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left;">
            <div>
                <p style="font-size:0.8rem; color:#aaa;">Toi</p>
                <input type="number" id="trade-my-coins" placeholder="Pièces" style="width:90%; padding:5px;">
                <select id="trade-my-zone" style="width:90%; margin-top:5px; background:#222; color:white;"></select>
            </div>
            <div>
                <p style="font-size:0.8rem; color:#aaa;">Partenaire</p>
                <div id="partner-offer" style="background:#222; padding:10px; border-radius:5px; min-height:60px; font-size:0.8rem;">
                    En attente...
                </div>
            </div>
        </div>
        <div id="trade-status" style="margin: 15px 0; font-weight: bold; color: #f1c40f;"></div>
        <div style="display:flex; gap:10px;">
            <button id="cancel-trade" style="background:#e74c3c;">Annuler</button>
            <button id="accept-trade" style="background:#2ecc71;">Prêt</button>
        </div>
    </div>
</div>
    
    
</body>
</html>
