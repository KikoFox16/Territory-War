/* --- Système de Toast --- */
#toast-container {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.toast {
    background: rgba(20, 20, 20, 0.95);
    color: white;
    padding: 14px 24px;
    border-radius: 12px;
    border-bottom: 3px solid #3498db; /* Barre de couleur en bas */
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    font-weight: 500;
    font-size: 0.9rem;
    animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}


@keyframes slideUp {
    from { transform: translateY(100px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes fadeOut {
    to { opacity: 0; transform: translateY(-20px); }
}

/* --- Modale Custom (Prompt/Alert) --- */
#custom-modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    backdrop-filter: blur(5px);
}

.modal-content {
    background: linear-gradient(145deg, #1a1a1a, #111);
    padding: 30px;
    border-radius: 24px;
    border: 1px solid #333;
    width: 85%;

}

.modal-content h3 {
    font-size: 1.5rem;

}


.modal-content input {
    background: #000;

    border: 1px solid #444;
    padding: 12px;

    box-sizing: border-box;

// --- SYSTÈME DE TOAST ---
function showToast(message, color = '#3498db') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.borderColor = color;
    toast.innerText = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// --- SYSTÈME DE MODALE PROMISE (Remplace Alert/Prompt) ---
function customDialog({ title, text, showInput = false, inputType = 'text', placeholder = '' }) {
    return new Promise((resolve) => {
        const modal = document.getElementById('custom-modal');
        const container = document.getElementById('modal-input-container');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        container.innerHTML = '';
        
        let inputField = null;
        if (showInput) {
            inputField = document.createElement('input');
            inputField.type = inputType;
            inputField.placeholder = placeholder;
            container.appendChild(inputField);
        }

        modal.classList.remove('hidden');

        document.getElementById('modal-confirm').onclick = () => {
            const value = inputField ? inputField.value : true;
            modal.classList.add('hidden');
            resolve(value);
        };

        document.getElementById('modal-cancel').onclick = () => {
            modal.classList.add('hidden');
            resolve(null);
        };
    });
}

function listenToFriends() {
    // --- 1. PARTIE DEMANDES D'AMIS ---
    onValue(ref(db, `requests/${myUser.uid}`), (snap) => {
        const reqs = snap.val();
        const container = document.getElementById('friends-requests');
        container.innerHTML = reqs ? "<h4 style='color:#aaa; margin-bottom:10px;'>Demandes en attente :</h4>" : "";
        if (reqs) {
            Object.keys(reqs).forEach(fromUid => {
                const r = reqs[fromUid];
                const div = document.createElement('div');
                div.className = 'friend-item';
                div.style.cssText = "flex-direction: column; align-items: stretch; gap: 10px; display: flex; padding: 12px; background: #1a1a1a; margin-bottom: 8px; border-radius: 15px; border: 1px solid #333;";
                
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:bold; color:#fff;">👤 ${r.from}</span>
                        <span style="font-size:0.7rem; color:#aaa;">veut être ton ami</span>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button style="flex:2; padding:10px; margin:0; background:#2ecc71; font-size:0.8rem; font-weight:bold; border-radius:10px;" onclick="acceptFriend('${fromUid}', '${r.from}')">ACCEPTER</button>
                        <button style="flex:1; padding:10px; margin:0; background:#e74c3c; font-size:0.8rem; font-weight:bold; border-radius:10px;" onclick="refuseFriend('${fromUid}')">REFUSER</button>
                    </div>`;
                container.appendChild(div);
            });
        }
    });

    // --- 2. PARTIE LISTE D'AMIS (Statut + Restriction Échange) ---
    onValue(ref(db, `friends/${myUser.uid}`), (snap) => {
        const friends = snap.val();
        const container = document.getElementById('friends-list');
        container.innerHTML = friends ? "<h4 style='color:#aaa; margin-top:20px; margin-bottom:10px;'>Tes Amis :</h4>" : "<p style='text-align:center; color:#666; margin-top:20px;'>Aucun ami pour le moment.</p>";
        
        if (friends) {
            Object.keys(friends).forEach(fUid => {
                const fData = friends[fUid];
                const userInAll = allUsers[fUid];
                
                // Vérification du statut en ligne (5 minutes)
                const isOnline = userInAll && (Date.now() - userInAll.lastSeen < 300000);
                const statusColor = isOnline ? '#2ecc71' : '#e74c3c';
                const statusText = isOnline ? 'EN LIGNE' : 'HORS LIGNE';

                const div = document.createElement('div');
                div.className = 'friend-item';
                div.style.cssText = "flex-direction: column; align-items: stretch; gap: 10px; display: flex; padding: 12px; background: #1a1a1a; margin-bottom: 8px; border-radius: 15px; border: 1px solid #333;";

                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:bold; color:#fff;">👤 ${fData.name}</span>
                        <span style="font-size:0.65rem; font-weight:bold; color:${statusColor}; border:1px solid ${statusColor}; padding:2px 6px; border-radius:4px;">${statusText}</span>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button style="flex:2; padding:10px; margin:0; background:${isOnline ? '#3498db' : '#555'}; font-size:0.8rem; font-weight:bold; border-radius:10px;" 
                                ${!isOnline ? 'disabled' : ''} 
                                onclick="initiateTrade('${fUid}', '${fData.name}')">
                            ${isOnline ? '🤝 ÉCHANGER' : '🚫 HORS LIGNE'}
                        </button>
                        <button style="flex:1; padding:10px; margin:0; background:#444; font-size:0.8rem; font-weight:bold; border-radius:10px;" onclick="removeFriend('${fUid}', '${fData.name}')">SUPPRIMER</button>
                    </div>`;
                container.appendChild(div);
            });
        }
    });
}


window.acceptFriend = async (fUid, fName) => {
    const updates = {};
    updates[`friends/${myUser.uid}/${fUid}`] = { name: fName };
    updates[`friends/${fUid}/${myUser.uid}`] = { name: myUser.username };
    updates[`requests/${myUser.uid}/${fUid}`] = null; 
    
    await update(ref(db), updates);
     showToast("Ami ajouté !", "#e74c3c");
};

window.refuseFriend = async (fUid) => {
    await set(ref(db, `requests/${myUser.uid}/${fUid}`), null);
};

// --- VARIABLES DE SESSION ---
let currentTradeId = null;
let tradeListener = null;

// --- 1. ENVOYER UNE DEMANDE D'ÉCHANGE ---
window.initiateTrade = async (partnerUid, partnerName) => {
    // 1. Vérification si en ligne via allUsers (tolérance de 5 minutes)
    const partner = allUsers[partnerUid];
    const isOnline = partner && (Date.now() - partner.lastSeen < 300000);
    
    if (!isOnline) {
        showToast(`${partnerName} semble être hors ligne !`, "#e74c3c");
        return;
    }

    // 2. Vérification du délai de 20 minutes (via localStorage)
    const lastTradeKey = `last_trade_${myUser.uid}_${partnerUid}`;
    const lastTradeTime = localStorage.getItem(lastTradeKey);
    const now = Date.now();
    const cooldown = 20 * 60 * 1000; // 20 minutes en ms

    if (lastTradeTime && (now - lastTradeTime < cooldown)) {
        const remainingMin = Math.ceil((cooldown - (now - lastTradeTime)) / 60000);
        showToast(`Attends encore ${remainingMin} min avant de solliciter ${partnerName}.`, "#f1c40f");
        return;
    }

    const confirmation = await customDialog({
        title: "🤝 Proposition d'échange",
        text: `Veux-tu envoyer une offre d'échange à ${partnerName} ?`
    });

    if (confirmation) {
        try {
            await set(ref(db, `tradeRequests/${partnerUid}/${myUser.uid}`), {
                from: myUser.username,
                fromUid: myUser.uid,
                timestamp: now
            });
            // Enregistre le temps de l'envoi
            localStorage.setItem(lastTradeKey, now);
            showToast("Demande d'échange envoyée !", "#2ecc71");

function listenToTradeRequests() {
    // Écouter les nouvelles demandes entrantes
    onValue(ref(db, `tradeRequests/${myUser.uid}`), (snap) => {
        const reqs = snap.val();
        if (!reqs) return;
        
        Object.keys(reqs).forEach(async (fromUid) => {
            const r = reqs[fromUid];
            const accept = await customDialog({
                title: "🤝 Demande d'échange",
                text: `${r.from} souhaite commercer avec toi !`
            });

            if (accept) {
                const tradeId = myUser.uid < fromUid ? `${myUser.uid}_${fromUid}` : `${fromUid}_${myUser.uid}`;
                await set(ref(db, `trades/${tradeId}`), {
                    status: "active",
                    [myUser.uid]: { ready: false, coins: 0, zoneId: "" },
                    [fromUid]: { ready: false, coins: 0, zoneId: "" }
                });
                await set(ref(db, `tradeRequests/${myUser.uid}/${fromUid}`), null);
                openTradeScreen(tradeId, r.from);
            } else {
                await set(ref(db, `tradeRequests/${myUser.uid}/${fromUid}`), null);
            }
        });
    });

    // CRUCIAL : Détecter si on est déjà dans un trade (même après refresh)
    onValue(ref(db, `trades`), (snap) => {
        const allTrades = snap.val();
        if (!allTrades || currentTradeId) return; // Si déjà ouvert, on ne fait rien

        Object.keys(allTrades).forEach(tId => {
            if (tId.includes(myUser.uid)) {
                const partnerUid = tId.split('_').find(id => id !== myUser.uid);
                const partnerName = allUsers[partnerUid]?.username || "Partenaire";
                openTradeScreen(tId, partnerName);
            }
        });
    });
}

function openTradeScreen(tradeId, partnerName) {

        zoneSelect.innerHTML += `<option value="${id}">🚩 Zone ${id} (Niv.${z.level || 1})</option>`;
    });

    // Nettoyage de l'ancien listener s'il existe
    if (tradeListener) tradeListener(); 

    // ÉCOUTEUR PRINCIPAL
    tradeListener = onValue(ref(db, `trades/${tradeId}`), (snap) => {
        const data = snap.val();
        if (!data) {
            console.log("Trade data nulle, fermeture...");
            closeTrade();
            return;
        }

        const partnerUid = tradeId.split('_').find(id => id !== myUser.uid);
        
        // On récupère les données de chacun
        const me = data[myUser.uid] || { coins: 0, zoneId: "", ready: false };
        const them = data[partnerUid] || { coins: 0, zoneId: "", ready: false };

        console.log("Mise à jour Trade - Moi:", me, "Lui:", them);

        // --- MISE À JOUR DE L'AFFICHAGE DU PARTENAIRE ---
        const partnerOfferDiv = document.getElementById('partner-offer');
        if (partnerOfferDiv) {
            partnerOfferDiv.innerHTML = `
                <div style="color:#f1c40f; font-size:1.2rem; margin-bottom:5px;">💰 ${them.coins || 0} pièces</div>
                <div style="color:#3498db; font-size:1.1rem; margin-bottom:10px;">🚩 ${them.zoneId ? 'Zone ' + them.zoneId : 'Aucune zone'}</div>
                <div id="partner-status-badge" style="
                    padding: 8px; 
                    border-radius: 8px; 
                    background: ${them.ready ? 'rgba(46, 204, 113, 0.2)' : 'rgba(230, 126, 34, 0.2)'}; 
                    color: ${them.ready ? '#2ecc71' : '#e67e22'}; 
                    font-weight: bold; 
                    border: 1px solid ${them.ready ? '#2ecc71' : '#e67e22'};
                    text-align: center;">
                    ${them.ready ? '✅ OFFRE VALIDÉE' : '⏳ EN ATTENTE...'}
                </div>
            `;
        }

        // --- MISE À JOUR DE MON BOUTON ---
        const acceptBtn = document.getElementById('accept-trade');
        if (me.ready) {
            acceptBtn.innerText = "OFFRE VERROUILLÉE";
            acceptBtn.style.background = "#555";

        } else {

    });

let tradeCountdownInterval = null;

function startTradeCountdown(tradeId) {
    if (tradeCountdownInterval) return;
    let count = 3;
    const statusDiv = document.getElementById('trade-status');
    
    tradeCountdownInterval = setInterval(async () => {
        statusDiv.innerText = `L'ÉCHANGE DÉBUTE DANS ${count}...`;
        if (count <= 0) {
            clearInterval(tradeCountdownInterval);
            tradeCountdownInterval = null;
            // Un seul des deux joueurs déclenche la finalisation (le premier dans l'ordre alpha par ex)
            const parts = tradeId.split('_');
            if (myUser.uid === parts[0]) {
                await finalizeTrade();
            }
        }
        count--;
    }, 1000);
}

function stopTradeCountdown() {
    if (tradeCountdownInterval) {
        clearInterval(tradeCountdownInterval);
        tradeCountdownInterval = null;
        document.getElementById('trade-status').innerText = "";
    }
}

// --- 5. FINALISATION (Mouvement des ressources) ---
async function finalizeTrade() {
    const snap = await get(ref(db, `trades/${currentTradeId}`));
    const trade = snap.val();
    if (!trade) return;

    // Extraction propre de l'ID partenaire
    const partnerUid = currentTradeId.split('_').find(id => id !== myUser.uid);
    const me = trade[myUser.uid];
    const them = trade[partnerUid];

    if (!me || !them) return;

    const updates = {};
    
    // Transfert des pièces
    updates[`users/${myUser.uid}/coins`] = (myUser.coins - (me.coins || 0)) + (them.coins || 0);
    updates[`users/${partnerUid}/coins`] = (allUsers[partnerUid].coins - (them.coins || 0)) + (me.coins || 0);

    // Transfert des zones
    if (me.zoneId) {
        updates[`zones/${me.zoneId}/ownerId`] = partnerUid;
        updates[`zones/${me.zoneId}/forSale`] = false;
    }
    if (them.zoneId) {
        updates[`zones/${them.zoneId}/ownerId`] = myUser.uid;
        updates[`zones/${them.zoneId}/forSale`] = false;
    }

    await update(ref(db), updates);
    await set(ref(db, `trades/${currentTradeId}`), null);
    showToast("Échange terminé !", "#2ecc71");
    closeTrade();
}

async function offlineIncomeCheck() {
    if (!myUser.uid || !myUser.lastIncomeTime) return;

    const now = Date.now();
    const diffMs = now - myUser.lastIncomeTime;
    
    if (diffMs >= INCOME_INTERVAL_MS) {
        const intervalsPassed = Math.floor(diffMs / INCOME_INTERVAL_MS);
        
        let myZones = Object.values(allZones).filter(z => z.ownerId === myUser.uid);
        
        if (myZones.length > 0) {
            let dailyIncome = myZones.reduce((acc, z) => acc + 2 + (((z.level||1) - 1) * 3), 0);
            let totalOfflineIncome = dailyIncome * intervalsPassed;

            if (totalOfflineIncome > 0) {
                 showToast(`💰 RÉCOLTE QUOTIDIENNE : +${totalOfflineIncome} pièces pour vos ${intervalsPassed} jour(s) de domination !`, "#e74c3c");
                
                const updates = {};
                updates[`users/${myUser.uid}/coins`] = (myUser.coins || 0) + totalOfflineIncome;
                updates[`users/${myUser.uid}/lastIncomeTime`] = now - (diffMs % INCOME_INTERVAL_MS); 
                
                await update(ref(db), updates);
            }
        }
    }
}

function startGPS() {
            if (!navigator.geolocation) return  showToast("GPS non supporté.", "#e74c3c");
            watchId = navigator.geolocation.watchPosition(
    (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        playerPos = { lat, lng };
        playerMarker.setLatLng([lat, lng]); 

        if (myUser.uid) {
            update(ref(db, `users/${myUser.uid}`), {
                lat: lat, lng: lng, lastSeen: Date.now()
            });
        }

        if (!isExploring) {
            const newZoneId = getZoneIdFromLatLng(lat, lng);
            if (newZoneId !== currentZoneId) {
                changeZone(newZoneId);
            }
        }
    }, 
 
                (err) => console.error(err),
                { enableHighAccuracy: true, maximumAge: 0 }
            );

        function getZoneIdFromLatLng(lat, lng) {
            const latIdx = Math.floor(lat / GRID_STEP_LAT);
            const lngIdx = Math.floor(lng / GRID_STEP_LNG);
            return `${latIdx}_${lngIdx}`;
        }

        function getBoundsFromZoneId(zoneId) {
            const parts = zoneId.split('_');
            const latIdx = parseInt(parts[0]);
            const lngIdx = parseInt(parts[1]);
            return [
                [latIdx * GRID_STEP_LAT, lngIdx * GRID_STEP_LNG], 
                [(latIdx + 1) * GRID_STEP_LAT, (lngIdx + 1) * GRID_STEP_LNG] 
            ];
        }

function renderZonesMap() {
    if (isExploring) return; 

    Object.values(zoneRectangles).forEach(rect => map.removeLayer(rect));
    zoneRectangles = {};

    if (!playerPos) return;

    Object.keys(allZones).forEach(zId => {
        const zone = allZones[zId];
        if (zone.ownerId === myUser.uid) {
            createZoneRectangle(zId, zone);
        }
    });

    const pLatIdx = Math.floor(playerPos.lat / GRID_STEP_LAT);
    const pLngIdx = Math.floor(playerPos.lng / GRID_STEP_LNG);
    const range = 20; 

    for (let i = -range; i <= range; i++) {
        for (let j = -range; j <= range; j++) {
            const zId = `${pLatIdx + i}_${pLngIdx + j}`;
            if (zoneRectangles[zId]) continue;
            createZoneRectangle(zId, allZones[zId]);
        }
    }
}


function createZoneRectangle(zId, zone) {
    const bounds = getBoundsFromZoneId(zId);
    
    let style = {
        color: '#aaa',
        weight: 1,
        fillOpacity: 0.05,
        interactive: true
    };

    if (zone) {
        const owner = allUsers[zone.ownerId];
        const protection = getProtectionStatus(zone);
        
        style.color = owner ? owner.color : '#555';
        style.weight = zone.level ? zone.level * 2 : 2;
        style.fillOpacity = zone.forSale ? 0.6 : 0.3;
        
        if (zone.ownerId === myUser.uid) {
            style.weight = (zone.level || 1) * 3;
            style.fillOpacity = 0.5;
        }

        if (protection.active) {
            style.color = "#f1c40f"; 
            style.weight = (zone.level || 1) * 5; 
            style.dashArray = null; 
        } else if (zone.forSale) {
            style.dashArray = '5, 5'; 
        }
    }

    const rect = L.rectangle(bounds, style).addTo(map);
    zoneRectangles[zId] = rect;

    rect.on('click', (e) => {
        L.DomEvent.stopPropagation(e);
        selectZone(zId);
    });
}

function renderExplorationZones(lat, lng) {
    const tLatIdx = Math.floor(lat / GRID_STEP_LAT);
    const tLngIdx = Math.floor(lng / GRID_STEP_LNG);
    const range = 5; 

    for (let i = -range; i <= range; i++) {
        for (let j = -range; j <= range; j++) {
            const zId = `${tLatIdx + i}_${tLngIdx + j}`;
            if (!zoneRectangles[zId]) {

                createZoneRectangle(zId, zone);
            }
        }
    }

        function captureTick() {
    const zone = allZones[currentZoneId];
            
    const protection = getProtectionStatus(zone);
    if (protection.active) {
        document.getElementById('capture-bar-fill').style.width = '0%';
        document.getElementById('capture-bar-fill').style.backgroundColor = '#95a5a6';
        document.getElementById('capture-text').innerText = "🛡️ ZONE PROTÉGÉE";
        return; 
    }        
            
    const isMine = zone && zone.ownerId === myUser.uid;
    
    if (isMine) {
        document.getElementById('capture-bar-fill').style.width = '100%';
        document.getElementById('capture-bar-fill').style.backgroundColor = '#2ecc71';
        document.getElementById('capture-text').innerText = "Territoire capturé";
        return;
    }

    let targetTime = TIME_FREE; 

    if (zone) {
        const lvl = zone.level || 1;
        if (lvl === 1) targetTime = 300;       // 5 min
        else if (lvl === 2) targetTime = 600;  // 10 min
        else if (lvl === 3) targetTime = 1200; // 20 min
        else if (lvl >= 4) targetTime = 1800;  // 30 min
    }

    captureTimer++;

    let percent = (captureTimer / targetTime) * 100;
    document.getElementById('capture-bar-fill').style.width = `${percent}%`;
    document.getElementById('capture-bar-fill').style.backgroundColor = zone ? '#e74c3c' : '#3498db';
    
    const minutes = Math.floor((targetTime - captureTimer) / 60);
    const seconds = Math.floor((targetTime - captureTimer) % 60);
    const timeString = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    
    document.getElementById('capture-text').innerText = `Capture : ${timeString}`;

    if (captureTimer >= targetTime) {
        clearInterval(captureInterval);
        captureZone(currentZoneId, zone);
    }
}

async function checkEncirclement(newZoneId) {
    const parts = newZoneId.split('_');
    const lat = parseInt(parts[0]);
    const lng = parseInt(parts[1]);
    const range = 5; // Distance max pour chercher un contour (5 zones de rayon)
    const updates = {};
    let zonesConquered = 0;

    // On cherche si cette zone fait partie d'un périmètre
    // Algorithme simplifié : On cherche des zones à nous aux 4 points cardinaux
    for (let r = 1; r <= range; r++) {
        const points = {
            top: `${lat + r}_${lng}`,
            bottom: `${lat - r}_${lng}`,
            left: `${lat}_${lng - r}`,
            right: `${lat}_${lng + r}`
        };

        // Si on possède des zones aux 4 extrémités de ce rayon
        if (allZones[points.top]?.ownerId === myUser.uid &&
            allZones[points.bottom]?.ownerId === myUser.uid &&
            allZones[points.left]?.ownerId === myUser.uid &&
            allZones[points.right]?.ownerId === myUser.uid) {

            // On a un carré ! On scanne tout l'intérieur
            for (let i = lat - r + 1; i < lat + r; i++) {
                for (let j = lng - r + 1; j < lng + r; j++) {
                    const targetId = `${i}_${j}`;
                    const targetZone = allZones[targetId];

                    // Si la zone est déjà à nous, on passe
                    if (targetZone?.ownerId === myUser.uid) continue;

                    let chance = 0;
                    if (!targetZone || !targetZone.ownerId) {
                        chance = 0.20; // 1 chance sur 5 pour zones libres
                    } else if (targetZone.ownerId !== myUser.uid) {
                        // On vérifie si la zone est protégée
                        const protection = getProtectionStatus(targetZone);
                        if (!protection.active) {
                            chance = 0.04; // 1 chance sur 25 pour zones ennemies (non protégées)
                        }
                    }

                    if (Math.random() < chance) {
                        updates[`zones/${targetId}`] = {
                            ownerId: myUser.uid,
                            level: targetZone ? (targetZone.level || 1) : 1,
                            forSale: false
                        };
                        zonesConquered++;
                    }
                }
            }
            break; // On a trouvé le carré le plus proche, on s'arrête
        }
    }

    if (zonesConquered > 0) {
        await update(ref(db), updates);
        showToast(`💥 Effet de siège ! ${zonesConquered} zones bonus capturées !`, "#9b59b6");
    }
}
    

async function captureZone(zoneId, existingZone) {
    document.getElementById('capture-text').innerText = "CAPTURE RÉUSSIE !";
    
    const isSteal = (existingZone && existingZone.ownerId && existingZone.ownerId !== myUser.uid);
    const updates = {};
    
    if (existingZone && existingZone.ownerId) {
        const oldOwnerRef = ref(db, `users/${existingZone.ownerId}/zonesCount`);
        runTransaction(oldOwnerRef, (currentCount) => (currentCount || 0) - 1);
    }

    let newTotal = (myUser.totalCaptured || 0) + 1;
    let coinsGained = 0;
    if (newTotal % 10 === 0) {
        coinsGained = 15;
        showToast("Bonus de conquête ! +15 pièces !", "#f1c40f");
    }

    updates[`users/${myUser.uid}/totalCaptured`] = newTotal;
    updates[`users/${myUser.uid}/zonesCount`] = (myUser.zonesCount || 0) + 1;
    if (coinsGained > 0) {
        updates[`users/${myUser.uid}/coins`] = (myUser.coins || 0) + coinsGained;
    }

    updates[`zones/${zoneId}`] = {
        ownerId: myUser.uid,
        level: existingZone ? (existingZone.level || 1) : 1,
        forSale: false,
        price: 0,
        protectionExpiry: 0
    };

    await update(ref(db), updates);

    // --- NOUVEAU : On vérifie si cela déclenche un encerclement ---
    await checkEncirclement(zoneId);

    if (isSteal) {
        updateQuestProgress('steal');
    } else {
        updateQuestProgress('capture');
    }
    
    captureTimer = 0; 
}


        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

async function protectZone(zoneId, plan) {
    if (myUser.coins < plan.cost) {
         showToast("Pas assez de pièces !", "#e74c3c");
        return;
    }

    const now = Date.now();
    const currentExpiry = (allZones[zoneId] && allZones[zoneId].protectionExpiry) || now;
    const baseTime = Math.max(now, currentExpiry);
    const newExpiry = baseTime + plan.duration;

    const updates = {};
    updates[`users/${myUser.uid}/coins`] = myUser.coins - plan.cost;
    updates[`zones/${zoneId}/protectionExpiry`] = newExpiry;

    await update(ref(db), updates);
     showToast(`Bouclier activé jusqu'au ${new Date(newExpiry).toLocaleDateString()} !`, "#e74c3c");
}

function getProtectionStatus(zone) {
    if (!zone || !zone.protectionExpiry) return { active: false };
    const remaining = zone.protectionExpiry - Date.now();
    return {
        active: remaining > 0,
        remaining: remaining,
        date: new Date(zone.protectionExpiry).toLocaleString()
    };
}

// Fonction pour générer ou récupérer les quêtes
async function checkQuests() {
    const snap = await get(ref(db, `users/${myUser.uid}/quests`));
    let userQuests = snap.val() || {};
    const now = Date.now();
    let needUpdate = false;

    // Type 1: Capturer des zones (24h)
    if (!userQuests.q1 || now > userQuests.q1.expiry) {
        const target = Math.floor(Math.random() * 9) + 2; // 2 à 10
        userQuests.q1 = { type: 'capture', target, current: 0, reward: target * 3, expiry: now + 86400000, label: `Conquérir ${target} zones` };
        needUpdate = true;
    }

    // Type 2: Voler des zones (24h)
    if (!userQuests.q2 || now > userQuests.q2.expiry) {
        const target = Math.floor(Math.random() * 5) + 1; // 1 à 5
        userQuests.q2 = { type: 'steal', target, current: 0, reward: target * 5, expiry: now + 86400000, label: `Voler ${target} zones à l'ennemi` };
        needUpdate = true;
    }

    // Type 3: Améliorer une zone (48h)
    if (!userQuests.q3 || now > userQuests.q3.expiry) {
        userQuests.q3 = { type: 'upgrade', target: 1, current: 0, reward: 10, expiry: now + 172800000, label: "Améliorer 1 territoire" };
        needUpdate = true;
    }

    if (needUpdate) await update(ref(db, `users/${myUser.uid}/quests`), userQuests);
}

async function renderQuests() {
    await checkQuests(); // On s'assure que les quêtes existent
    const snap = await get(ref(db, `users/${myUser.uid}/quests`));
    const quests = snap.val();
    const container = document.getElementById('quests-container');
    
    if (!quests) {
        container.innerHTML = "<p style='text-align:center; color:#666;'>Génération des missions...</p>";
        return;
    }

    container.innerHTML = ""; // On vide le container

    Object.keys(quests).forEach(key => {
        const q = quests[key];
        const isDone = q.current >= q.target;
        // Calcul du pourcentage pour la barre
        const progressPercent = Math.min(100, (q.current / q.target) * 100);
        
        const card = document.createElement('div');
        card.style.cssText = `
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid ${isDone ? '#2ecc71' : '#333'}; 
            margin-bottom: 10px;
            transition: all 0.3s;
        `;
        
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-weight:bold; color: ${isDone ? '#2ecc71' : '#fff'};">
                    ${isDone ? '✅' : '⚔️'} ${q.label}
                </span>
                <span style="color:#f1c40f; font-weight:bold;">+${q.reward}💰</span>
            </div>

            <div style="background:#000; height:12px; border-radius:6px; overflow:hidden; border: 1px solid #333;">
                <div style="width:${progressPercent}%; background:${isDone ? '#2ecc71' : '#3498db'}; height:100%; transition: width 0.5s ease-out;"></div>
            </div>

            <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#aaa; margin-top:8px;">
                <span style="font-family: monospace;">Progression: [${q.current}/${q.target}]</span>
                <span>${Math.floor(progressPercent)}%</span>
            </div>
        `;
        container.appendChild(card);
    });
}


async function updateQuestProgress(type) {
    const snap = await get(ref(db, `users/${myUser.uid}/quests`));
    if (!snap.exists()) return;
    
    const quests = snap.val();
    let hasChanged = false;
    
    for (let key in quests) {
        let q = quests[key];
        // On vérifie si le type correspond et si la quête n'est pas déjà finie
        if (q.type === type && q.current < q.target) {
            q.current += 1;
            hasChanged = true;

            // Si elle vient de se terminer
            if (q.current >= q.target) {
                showToast(`🏆 Quête terminée : ${q.label} ! (+${q.reward}💰)`, "#2ecc71");
                // On donne la récompense immédiatement en local pour l'UI
                myUser.coins += q.reward; 
                await update(ref(db, `users/${myUser.uid}`), { coins: myUser.coins });
            }
        }
    }

    if (hasChanged) {
        await update(ref(db, `users/${myUser.uid}/quests`), quests);
        // Si le menu des quêtes est ouvert, on le rafraîchit
        if (!document.getElementById('quests-screen').classList.contains('hidden')) {
            renderQuests();
        }
    }
}
