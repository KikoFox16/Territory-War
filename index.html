<html lang="fr">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Roboto, sans-serif; background-color: #111; color: #eee; overflow: hidden; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,15,15,0.95); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(5px); }

}

#leaderboard h3 {

<body>

    <div id="login-screen" class="screen">
        <h1>Territory War</h1>

    <div id="hud" class="hidden">
        <div class="top-bar">

                <div id="capture-bar-fill"></div>

            <div id="zone-actions" class="action-buttons hidden">
            </div>

    <div id="map"></div>

    <script type="module">
    
    const manifest = {
        "name": "Territory War", "short_name": "Territory War", "start_url": window.location.href,
        "display": "standalone", "background_color": "#000000", "theme_color": "#0088cc",
        "icons": [{"src": "https://cdn-icons-png.flaticon.com/512/7555/7555333.png", "sizes": "192x192", "type": "image/png"}]
    };
    const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
    const link = document.createElement('link'); link.rel = 'manifest'; link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);

    
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, onValue, child, runTransaction } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBqRloMg22mDsnfqhNK77vREQYtLFBgyf0",
            authDomain: "territory-war-acfca.firebaseapp.com",
            databaseURL: "https://territory-war-acfca-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "territory-war-acfca",
            storageBucket: "territory-war-acfca.firebasestorage.app",
            messagingSenderId: "399616663350",
            appId: "1:399616663350:web:b69d53d353181cbe679d97",
            measurementId: "G-5MSDF4XKQJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let map, playerMarker;
        let playerPos = { lat: 48.8566, lng: 2.3522 }; 
        let watchId = null;
        let myUser = { uid: null, username: '', color: '', coins: 0, totalCaptured: 0, zonesCount: 0 };
        let allUsers = {};
        let allZones = {};
        let zoneRectangles = {}; 
        let otherPlayersMarkers = {}; 
    
        const GRID_STEP_LAT = 0.0009;
        const GRID_STEP_LNG = 0.0013;

        let selectedZoneId = null; 

    
        let currentZoneId = null;
        let captureTimer = 0;
        let captureInterval = null;
        let incomeInterval = null;
        const TIME_FREE = 60; // 1 minutes
        const TIME_STEAL = 300; // 5 minutes
        const INCOME_INTERVAL_MS = 24 * 60 * 60 * 1000; // 24h

        window.onload = () => {
            const savedUid = localStorage.getItem('tw_uid');
            if (savedUid) {
                get(ref(db, `users/${savedUid}`)).then((snapshot) => {
                    if (snapshot.exists()) {
                        myUser = { uid: savedUid, ...snapshot.val() };
                        startGame();
                    } else {
                        document.getElementById('login-screen').classList.remove('hidden');
                    }
                });
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        };

        document.getElementById('join-btn').addEventListener('click', async () => {
            const username = document.getElementById('username-input').value.trim();
            const color = document.getElementById('color-input').value;
            const errorTxt = document.getElementById('login-error');
            
            if (username.length < 3) {
                errorTxt.innerText = "Le pseudo doit faire au moins 3 caractères.";
                errorTxt.classList.remove('hidden');
                return;
            }

            const uid = 'usr_' + Date.now() + Math.floor(Math.random()*1000);
            const newUser = {
                username: username,
                color: color,
                coins: 0, 
                totalCaptured: 0,
                zonesCount: 0,
                lastIncomeTime: Date.now()
            };

            await set(ref(db, `users/${uid}`), newUser);
            localStorage.setItem('tw_uid', uid);
            myUser = { uid, ...newUser };
            
            document.getElementById('login-screen').classList.add('hidden');
            startGame();
        });

function startGame() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');

    initMap();
    listenToDatabase();
    startGPS();

    setTimeout(() => {
        offlineIncomeCheck();
    }, 2000);

    incomeInterval = setInterval(collectIncome, INCOME_INTERVAL_MS);
    updateHUD();
}

async function offlineIncomeCheck() {
    if (!myUser.uid || !myUser.lastIncomeTime) return;

    const now = Date.now();
    const diffMs = now - myUser.lastIncomeTime;
    
    if (diffMs >= INCOME_INTERVAL_MS) {
        const intervalsPassed = Math.floor(diffMs / INCOME_INTERVAL_MS);
        
        let myZones = Object.values(allZones).filter(z => z.ownerId === myUser.uid);
        
        if (myZones.length > 0) {
            let dailyIncome = myZones.reduce((acc, z) => acc + 5 + (((z.level||1) - 1) * 3), 0);
            let totalOfflineIncome = dailyIncome * intervalsPassed;

            if (totalOfflineIncome > 0) {
                alert(`💰 RÉCOLTE QUOTIDIENNE : +${totalOfflineIncome} pièces pour vos ${intervalsPassed} jour(s) de domination !`);
                
                const updates = {};
                updates[`users/${myUser.uid}/coins`] = (myUser.coins || 0) + totalOfflineIncome;
                updates[`users/${myUser.uid}/lastIncomeTime`] = now - (diffMs % INCOME_INTERVAL_MS); 
                
                await update(ref(db), updates);
            }
        }
    }
}



        function initMap() {
            map = L.map('map', { zoomControl: false, interactive: true }).setView([playerPos.lat, playerPos.lng], 17);
            const tileUrl = 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png';

            L.tileLayer(tileUrl, {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            const hour = new Date().getHours();
            if (hour >= 21 || hour < 6) {
                document.body.classList.add('night-mode');
            }

            const icon = L.divIcon({ className: 'custom-div-icon', html: `<div class='player-marker' style='border-color: ${myUser.color}'></div>`, iconSize: [16, 16], iconAnchor: [8, 8] });
            playerMarker = L.marker([playerPos.lat, playerPos.lng], {icon: icon}).addTo(map);
                
map.on('click', () => {
    selectedZoneId = null;
    checkCurrentZoneContext();
});

        }

        function listenToDatabase() {
            onValue(ref(db, `users/${myUser.uid}`), (snapshot) => {
                if(snapshot.exists()) {
                    myUser = { uid: myUser.uid, ...snapshot.val() };
                    updateHUD();
                }
            });

            onValue(ref(db, 'users'), (snapshot) => {
                if(snapshot.exists()) {
                    allUsers = snapshot.val();
                    updateLeaderboard();
                    updateZoneColors();

                    Object.keys(allUsers).forEach(uid => {
                        if (uid === myUser.uid) return; 

                        const user = allUsers[uid];
                        if (user.lat && user.lng && (Date.now() - user.lastSeen < 300000)) {
                            
                            const dist = getDistance(playerPos.lat, playerPos.lng, user.lat, user.lng);
                            
                            if (dist <= 10) { 
                                if (!otherPlayersMarkers[uid]) {
                                    const otherIcon = L.divIcon({ 
                                        className: 'custom-div-icon', 
                                        html: `<div class='player-marker' style='border-color: ${user.color}; background-color: rgba(255,255,255,0.7)'></div>`, 
                                        iconSize: [12, 12], 
                                        iconAnchor: [6, 6] 
                                    });
                                    otherPlayersMarkers[uid] = L.marker([user.lat, user.lng], {icon: otherIcon})
                                        .addTo(map)
                                        .bindTooltip(user.username, {permanent: false, direction: 'top'});
                                } else {
                                    otherPlayersMarkers[uid].setLatLng([user.lat, user.lng]);
                                }
                            } else {
                                if (otherPlayersMarkers[uid]) {
                                    map.removeLayer(otherPlayersMarkers[uid]);
                                    delete otherPlayersMarkers[uid];
                                }
                            }
                        } else {
                            if (otherPlayersMarkers[uid]) {
                                map.removeLayer(otherPlayersMarkers[uid]);
                                delete otherPlayersMarkers[uid];
                            }
                        }
                    });
                }
            });

            onValue(ref(db, 'zones'), (snapshot) => {
                const data = snapshot.val() || {};
                allZones = data;
                renderZonesMap();
                checkCurrentZoneContext(); 
            });
        }

        function startGPS() {
            if (!navigator.geolocation) return alert("GPS non supporté.");
            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    playerPos = { lat, lng };
                    playerMarker.setLatLng([lat, lng]); 

                    // Envoyer ma position à Firebase
                    if (myUser.uid) {
                        update(ref(db, `users/${myUser.uid}`), {
                            lat: lat,
                            lng: lng,
                            lastSeen: Date.now()
                        });
                    }

                    const newZoneId = getZoneIdFromLatLng(lat, lng);
                    if (newZoneId !== currentZoneId) {
                        changeZone(newZoneId);
                    }
                }, 
                (err) => console.error(err),
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        }

        function getZoneIdFromLatLng(lat, lng) {
            const latIdx = Math.floor(lat / GRID_STEP_LAT);
            const lngIdx = Math.floor(lng / GRID_STEP_LNG);
            return `${latIdx}_${lngIdx}`;
        }

        function getBoundsFromZoneId(zoneId) {
            const parts = zoneId.split('_');
            const latIdx = parseInt(parts[0]);
            const lngIdx = parseInt(parts[1]);
            return [
                [latIdx * GRID_STEP_LAT, lngIdx * GRID_STEP_LNG], 
                [(latIdx + 1) * GRID_STEP_LAT, (lngIdx + 1) * GRID_STEP_LNG] 
            ];
        }

function renderZonesMap() {
    Object.values(zoneRectangles).forEach(rect => map.removeLayer(rect));
    zoneRectangles = {};

    if (!playerPos) return;

    Object.keys(allZones).forEach(zId => {
        const zone = allZones[zId];
        
        if (zone.ownerId === myUser.uid) {
            createZoneRectangle(zId, zone);
        }
    });

    const pLatIdx = Math.floor(playerPos.lat / GRID_STEP_LAT);
    const pLngIdx = Math.floor(playerPos.lng / GRID_STEP_LNG);
    const range = 20; 

    for (let i = -range; i <= range; i++) {
        for (let j = -range; j <= range; j++) {
            const zId = `${pLatIdx + i}_${pLngIdx + j}`;
            
            if (zoneRectangles[zId]) continue;

            const zone = allZones[zId];
            createZoneRectangle(zId, zone);
        }
    }
}

function createZoneRectangle(zId, zone) {
    const bounds = getBoundsFromZoneId(zId);
    
    let style = {
        color: '#aaa',
        weight: 1,
        fillOpacity: 0.05,
        interactive: true
    };

    if (zone) {
        const owner = allUsers[zone.ownerId];
        style.color = owner ? owner.color : '#555';
        style.weight = zone.level ? zone.level * 2 : 2;
        style.fillOpacity = zone.forSale ? 0.6 : 0.3;
        
        if (zone.ownerId === myUser.uid) {
            style.weight = (zone.level || 1) * 3;
            style.fillOpacity = 0.5;
        }
        
        if (zone.forSale) style.dashArray = '5, 5';
    }

    const rect = L.rectangle(bounds, style).addTo(map);
    zoneRectangles[zId] = rect;

    rect.on('click', (e) => {
        L.DomEvent.stopPropagation(e);
        selectZone(zId);
    });
}
    
    


        function changeZone(newZoneId) {
            currentZoneId = newZoneId;
            captureTimer = 0;
            document.getElementById('zone-coords').innerText = `ID: ${newZoneId}`;
            
            if (captureInterval) clearInterval(captureInterval);
            captureInterval = setInterval(captureTick, 1000);
            
            checkCurrentZoneContext();
        }

const shopBtn = document.getElementById('shop-toggle-btn');
const shopScreen = document.getElementById('shop-screen');
const closeShop = document.getElementById('close-shop');
const shopList = document.getElementById('shop-list');
const shopSort = document.getElementById('shop-sort');

shopBtn.onclick = () => {
    shopScreen.classList.remove('hidden');
    renderShop();
};

closeShop.onclick = () => shopScreen.classList.add('hidden');

shopSort.onchange = () => renderShop();

function renderShop() {
    shopList.innerHTML = "";
    
    let forSale = [];
    for (let id in allZones) {
        if (allZones[id].forSale) {
            forSale.push({ id: id, ...allZones[id] });
        }
    }

    if (forSale.length === 0) {
        shopList.innerHTML = "<p style='color:#888;'>Aucune zone en vente pour le moment.</p>";
        return;
    }

    const criteria = shopSort.value;
    forSale.sort((a, b) => {
        if (criteria === "price_asc") return a.price - b.price;
        if (criteria === "price_desc") return b.price - a.price;
        if (criteria === "level_asc") return (a.level || 1) - (b.level || 1);
        if (criteria === "level_desc") return (b.level || 1) - (a.level || 1);
    });

    forSale.forEach(zone => {
        const owner = allUsers[zone.ownerId] || { username: "Inconnu", color: "#ccc" };
        const item = document.createElement('div');
        item.style.cssText = "background: #1a1a1a; padding: 12px; border-radius: 10px; border-left: 5px solid " + owner.color + "; display: flex; justify-content: space-between; align-items: center; text-align: left;";
        
item.innerHTML = `
    <div>
        <div style="font-weight: bold;">Zone ${zone.id}</div>
        <div style="font-size: 0.8rem; color: #aaa;">Vendeur: ${owner.username} | Niv: ${zone.level || 1}</div>
        <div style="color: #f1c40f; font-weight: bold;">💰 ${zone.price}</div>
    </div>
    <div style="display: flex; flex-direction: column; gap: 5px; min-width: 100px;">
        <button style="padding: 5px 10px; font-size: 0.7rem; margin:0;" onclick="window.goToZone('${zone.id}')">VOIR</button>
        
        <button 
            style="padding: 0; height: 35px; font-size: 0.7rem; margin:0; background:#2ecc71; 
                   display: flex; align-items: center; justify-content: center; text-align: center;" 
            ${myUser.coins < zone.price ? 'disabled' : ''} 
            onclick="window.buyInShop('${zone.id}')"
        >
            ACHETER
        </button>
    </div>
`;

        shopList.appendChild(item);
    });
}

window.goToZone = (id) => {
    const bounds = getBoundsFromZoneId(id);
    map.fitBounds(bounds); 
    selectZone(id); 
    shopScreen.classList.add('hidden'); 
};

window.buyInShop = (id) => {
    if (confirm(`Voulez-vous acheter la zone ${id} ?`)) {
        buyZone(id, allZones[id]);
        setTimeout(renderShop, 500); 
    }
};
    
    
function checkCurrentZoneContext() {
    if (!currentZoneId) return;

    if (!selectedZoneId || selectedZoneId === currentZoneId) {
        selectZone(currentZoneId);
    } else {
        selectZone(selectedZoneId);
    }
}



        function captureTick() {
    const zone = allZones[currentZoneId];
    const isMine = zone && zone.ownerId === myUser.uid;
    
    if (isMine) {
        document.getElementById('capture-bar-fill').style.width = '100%';
        document.getElementById('capture-bar-fill').style.backgroundColor = '#2ecc71';
        document.getElementById('capture-text').innerText = "Territoire sécurisé";
        return;
    }

    // --- CALCUL DU TEMPS DYNAMIQUE ---
    let targetTime = TIME_FREE; // Par défaut 60s pour zone libre

    if (zone) {
        const lvl = zone.level || 1;
        if (lvl === 1) targetTime = 300;       // 5 min
        else if (lvl === 2) targetTime = 600;  // 10 min
        else if (lvl === 3) targetTime = 1200; // 20 min
        else if (lvl >= 4) targetTime = 1800;  // 30 min
    }
    // ---------------------------------

    captureTimer++;

    let percent = (captureTimer / targetTime) * 100;
    document.getElementById('capture-bar-fill').style.width = `${percent}%`;
    document.getElementById('capture-bar-fill').style.backgroundColor = zone ? '#e74c3c' : '#3498db';
    
    // Formatage du texte pour afficher minutes:secondes
    const minutes = Math.floor((targetTime - captureTimer) / 60);
    const seconds = Math.floor((targetTime - captureTimer) % 60);
    const timeString = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    
    document.getElementById('capture-text').innerText = `Capture : ${timeString}`;

    if (captureTimer >= targetTime) {
        clearInterval(captureInterval);
        captureZone(currentZoneId, zone);
    }
}


        async function captureZone(zoneId, existingZone) {
            document.getElementById('capture-text').innerText = "CAPTURE RÉUSSIE !";
            
            const updates = {};
            
            if (existingZone && existingZone.ownerId) {
                const oldOwnerRef = ref(db, `users/${existingZone.ownerId}/zonesCount`);
                runTransaction(oldOwnerRef, (currentCount) => (currentCount || 0) - 1);
            }

            let newTotal = (myUser.totalCaptured || 0) + 1;
            let coinsGained = 0;
            if (newTotal % 10 === 0) {
                coinsGained = 15;
                alert("Bonus de conquête ! +15 pièces !");
            }

            updates[`users/${myUser.uid}/totalCaptured`] = newTotal;
            updates[`users/${myUser.uid}/zonesCount`] = (myUser.zonesCount || 0) + 1;
            if (coinsGained > 0) updates[`users/${myUser.uid}/coins`] = (myUser.coins || 0) + coinsGained;

            updates[`zones/${zoneId}`] = {
                ownerId: myUser.uid,
                level: existingZone ? existingZone.level : 1,
                forSale: false,
                price: 0
            };

            await update(ref(db), updates);
            captureTimer = 0; 
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function getUpgradeCost(currentLevel) {
            if (currentLevel === 1) return 50;
            if (currentLevel === 2) return 75;
            if (currentLevel === 3) return 100;
            return null; 
        }

        async function upgradeZone(zoneId, currentLevel, cost) {
            if (myUser.coins < cost) return;
            
            const updates = {};
            updates[`users/${myUser.uid}/coins`] = myUser.coins - cost;
            updates[`zones/${zoneId}/level`] = currentLevel + 1;
            
            await update(ref(db), updates);
        }

        async function setZoneForSale(zoneId, isForSale, price) {
            const updates = {};
            updates[`zones/${zoneId}/forSale`] = isForSale;
            updates[`zones/${zoneId}/price`] = price;
            await update(ref(db), updates);
        }

        async function buyZone(zoneId, zoneData) {
            if (myUser.coins < zoneData.price) return;

            const updates = {};
            updates[`users/${myUser.uid}/coins`] = myUser.coins - zoneData.price;
            updates[`users/${myUser.uid}/zonesCount`] = (myUser.zonesCount || 0) + 1;
            
            const seller = allUsers[zoneData.ownerId];
            if (seller) {
                updates[`users/${zoneData.ownerId}/coins`] = (seller.coins || 0) + zoneData.price;
                updates[`users/${zoneData.ownerId}/zonesCount`] = Math.max(0, (seller.zonesCount || 1) - 1);
            }

            updates[`zones/${zoneId}/ownerId`] = myUser.uid;
            updates[`zones/${zoneId}/forSale`] = false;
            updates[`zones/${zoneId}/price`] = 0;

            await update(ref(db), updates);
            alert("Zone achetée avec succès !");
        }

        async function collectIncome() {
            let myZones = Object.values(allZones).filter(z => z.ownerId === myUser.uid);
            if (myZones.length === 0) return;

            let income = 0;
            myZones.forEach(z => {
                let lvl = z.level || 1;
                income += 2 + ((lvl - 1) * 3); 
            });

            const updates = {};
            updates[`users/${myUser.uid}/coins`] = myUser.coins + income;
            updates[`users/${myUser.uid}/lastIncomeTime`] = Date.now();
            
            await update(ref(db), updates);
        }

        function updateHUD() {
            document.getElementById('coins-display').innerText = `💰 ${myUser.coins}`;
            document.getElementById('zone-count-display').innerText = `🚩 ${myUser.zonesCount || 0} territoires`;
            
            let myZones = Object.values(allZones).filter(z => z.ownerId === myUser.uid);
            let income = myZones.reduce((acc, z) => acc + 2 + (((z.level||1) - 1) * 3), 0);
            document.getElementById('income-display').innerText = income;

            checkCurrentZoneContext(); 
        }
    
    function selectZone(zoneId) {
    selectedZoneId = zoneId; 
    const zone = allZones[zoneId];
    const actionsDiv = document.getElementById('zone-actions');
    const statusDiv = document.getElementById('zone-status');
    const coordsDiv = document.getElementById('zone-coords');
    
    coordsDiv.innerText = `ID: ${zoneId}`;
    actionsDiv.innerHTML = ''; 
    actionsDiv.classList.add('hidden');

    if (!zone) {
        statusDiv.innerText = "Zone Libre";
        statusDiv.style.color = "white";
        let info = document.createElement('div');
        info.style.fontSize = "0.8rem";
        info.style.color = "#aaa";
        info.innerText = "Déplacez-vous ici pour capturer";
        actionsDiv.appendChild(info);
        actionsDiv.classList.remove('hidden');
    } 
    
    else if (zone.ownerId === myUser.uid) {
        statusDiv.innerText = `Ta zone (Niv ${zone.level || 1})`;
        statusDiv.style.color = myUser.color;
        actionsDiv.classList.remove('hidden');
        
        let upgradeCost = getUpgradeCost(zone.level || 1);
        if (upgradeCost) {
            let btnUp = document.createElement('button');
            btnUp.className = 'btn-upgrade';
            btnUp.innerText = `Améliorer (${upgradeCost}💰)`;
            btnUp.disabled = myUser.coins < upgradeCost;
            btnUp.onclick = (e) => {
                e.stopPropagation(); 
                upgradeZone(zoneId, zone.level || 1, upgradeCost);
            };
            actionsDiv.appendChild(btnUp);
        }

        let btnSell = document.createElement('button');
        btnSell.className = 'btn-sell';
        if (zone.forSale) {
            btnSell.innerText = "Retirer de la vente";
            btnSell.onclick = (e) => {
                e.stopPropagation();
                setZoneForSale(zoneId, false, 0);
            };
        } else {
            btnSell.innerText = "Mettre en vente";
            btnSell.onclick = (e) => {
                e.stopPropagation();
                let price = prompt("Prix de vente (pièces) ?");
                if(price && !isNaN(price) && parseInt(price) > 0) {
                    setZoneForSale(zoneId, true, parseInt(price));
                }
            };
        }
        actionsDiv.appendChild(btnSell);
    } 
    
    else {
        const owner = allUsers[zone.ownerId];
        const ownerName = owner ? owner.username : 'Inconnu';
        const ownerColor = owner ? owner.color : '#fff';
        
        statusDiv.innerHTML = `Zone de <span style="color:${ownerColor}">${ownerName}</span> (Niv ${zone.level || 1})`;
        
        if (zone.forSale) {
            actionsDiv.classList.remove('hidden');
            let btnBuy = document.createElement('button');
            btnBuy.className = 'btn-buy';
            btnBuy.innerText = `Acheter (${zone.price}💰)`;
            btnBuy.disabled = myUser.coins < zone.price;
            btnBuy.onclick = (e) => {
                e.stopPropagation();
                buyZone(zoneId, zone);
            };
            actionsDiv.appendChild(btnBuy);
        }
    }
}
