/* --- Système de Toast --- */
#toast-container {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.toast {
    background: rgba(20, 20, 20, 0.95);
    color: white;
    padding: 14px 24px;
    border-radius: 12px;
    border-bottom: 3px solid #3498db; /* Barre de couleur en bas */
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    backdrop-filter: blur(8px);
    font-weight: 500;
    font-size: 0.9rem;
    animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}


@keyframes slideUp {
    from { transform: translateY(100px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes fadeOut {
    to { opacity: 0; transform: translateY(-20px); }
}

/* --- Modale Custom (Prompt/Alert) --- */
#custom-modal {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    backdrop-filter: blur(5px);
}

.modal-content {

    padding: 30px;
    border-radius: 24px;
    border: 1px solid #333;
    width: 85%;

    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
}

.modal-content h3 {
    font-size: 1.5rem;
    margin-bottom: 10px;
    background: linear-gradient(to right, #fff, #888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}


.modal-content input {
    background: #000;

    border: 1px solid #444;

function showToast(message, color = '#3498db') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.borderColor = color;
    toast.innerText = message;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function customDialog({ title, text, showInput = false, inputType = 'text', placeholder = '' }) {
    return new Promise((resolve) => {
        const modal = document.getElementById('custom-modal');
        const container = document.getElementById('modal-input-container');
        document.getElementById('modal-title').innerText = title;
        document.getElementById('modal-text').innerText = text;
        container.innerHTML = '';
        
        let inputField = null;
        if (showInput) {
            inputField = document.createElement('input');
            inputField.type = inputType;
            inputField.placeholder = placeholder;
            container.appendChild(inputField);
        }

        modal.classList.remove('hidden');

        document.getElementById('modal-confirm').onclick = () => {
            const value = inputField ? inputField.value : true;
            modal.classList.add('hidden');
            resolve(value);
        };

        document.getElementById('modal-cancel').onclick = () => {
            modal.classList.add('hidden');
            resolve(null);
        };
    });
}

// 1. Créer une enchère
document.getElementById('btn-create-auction-trigger').onclick = async () => {
    // Vérifier si le joueur a des zones
    const myZones = Object.keys(allZones).filter(id => allZones[id].ownerId === myUser.uid);
    if (myZones.length === 0) {
        showToast("Tu n'as aucun territoire à vendre !", "#e74c3c");
        return;
    }

    const zoneId = await customDialog({
        title: "Sélectionner la zone",
        text: "ID de la zone à mettre aux enchères :",
        showInput: true, placeholder: "Ex: 54285_2613"
    });
    if (!zoneId || !allZones[zoneId] || allZones[zoneId].ownerId !== myUser.uid) {
        showToast("Zone invalide ou ne t'appartient pas.", "#e74c3c");
        return;
    }

    const title = await customDialog({ title: "Nom de l'enchère", text: "Donne un nom épique :", showInput: true, placeholder: "La citadelle d'or..." });
    const startPrice = await customDialog({ title: "Prix de départ", text: "Mise minimale :", showInput: true, inputType: 'number', placeholder: "Prix en 💰" });
    const days = await customDialog({ title: "Durée", text: "Nombre de jours (1 à 5) :", showInput: true, inputType: 'number', placeholder: "Jours" });

    if (title && startPrice > 0 && days >= 1 && days <= 5) {
        const auctionData = {
            sellerId: myUser.uid,
            sellerName: myUser.username,
            zoneId: zoneId,
            title: title,
            currentPrice: parseInt(startPrice),
            highestBidderId: null,
            highestBidderName: "Aucun",
            expiry: Date.now() + (parseInt(days) * 86400000),
            status: "open"
        };

        const newAuctionKey = 'auc_' + Date.now();
        const updates = {};
        updates[`auctions/${newAuctionKey}`] = auctionData;
        // On verrouille la zone pour qu'elle ne soit pas vendue ailleurs
        updates[`zones/${zoneId}/forSale`] = false; 
        
        await update(ref(db), updates);
        showToast("Enchère lancée !", "#9b59b6");
        writeLog('SHOP', `A lancé une enchère pour la zone ${zoneId}`);
    }
};

// 2. Écouter les enchères
function listenToAuctions() {
    onValue(ref(db, 'auctions'), (snapshot) => {
        const auctions = snapshot.val();
        auctionList.innerHTML = "";
        if (!auctions) {
            auctionList.innerHTML = "<p style='text-align:center; color:#666;'>Aucune enchère en cours.</p>";
            return;
        }

        Object.keys(auctions).forEach(aucId => {
            const auc = auctions[aucId];
            if (auc.status !== "open") return;

            // Vérifier expiration
            if (Date.now() > auc.expiry) {
                finalizeAuction(aucId, auc);
                return;
            }

            const timeLeft = Math.round((auc.expiry - Date.now()) / 3600000);
            const card = document.createElement('div');
            card.className = 'friend-item'; // Réutilisation du style existant
            card.style.flexDirection = "column";
            card.style.alignItems = "stretch";

            card.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <b style="color:#9b59b6;">${auc.title}</b>
                    <span style="font-size:0.7rem; color:#aaa;">⏳ ~${timeLeft}h restantes</span>
                </div>
                <div style="font-size:0.8rem; margin:5px 0;">Zone: ${auc.zoneId} | Vendeur: ${auc.sellerName}</div>
                <div style="background:#000; padding:10px; border-radius:8px; margin:5px 0; border:1px solid #444;">

window.bidOnAuction = async (aucId) => {
    const amount = await customDialog({
        title: "Placer une offre",
        text: "Combien proposes-tu ?",
        showInput: true, inputType: 'number'
    });

    if (!amount || isNaN(amount)) return;
    const bidValue = parseInt(amount);

    if (bidValue <= 0 || bidValue > myUser.coins) {
        showToast("Fonds insuffisants ou montant invalide !", "#e74c3c");
        return;
    }

    const auctionRef = ref(db, `auctions/${aucId}`);
    runTransaction(auctionRef, (currentData) => {
        if (currentData) {
            if (bidValue <= currentData.currentPrice) {
                return; // Annule si quelqu'un a mis plus entre temps
            }
            currentData.currentPrice = bidValue;
            currentData.highestBidderId = myUser.uid;
            currentData.highestBidderName = myUser.username;
        }
        return currentData;
    }).then((result) => {
        if (!result.committed) {
            showToast("Ton offre doit être supérieure au prix actuel !", "#e74c3c");
        } else {
            showToast("Offre acceptée !", "#2ecc71");
        }
    });
};

// 4. Finaliser l'enchère (transfert de propriété)
async function finalizeAuction(aucId, auc) {
    if (auc.status === "closed") return;

    const updates = {};
    updates[`auctions/${aucId}/status`] = "closed";

    if (auc.highestBidderId) {
        // Un acheteur a été trouvé
        updates[`zones/${auc.zoneId}/ownerId`] = auc.highestBidderId;
        updates[`users/${auc.highestBidderId}/coins`] = (allUsers[auc.highestBidderId]?.coins || 0) - auc.currentPrice;
        updates[`users/${auc.sellerId}/coins`] = (allUsers[auc.sellerId]?.coins || 0) + auc.currentPrice;
        
        // Ajuster les compteurs de zones
        updates[`users/${auc.sellerId}/zonesCount`] = Math.max(0, (allUsers[auc.sellerId]?.zonesCount || 1) - 1);
        updates[`users/${auc.highestBidderId}/zonesCount`] = (allUsers[auc.highestBidderId]?.zonesCount || 0) + 1;
    }

    await update(ref(db), updates);
    console.log(`Enchère ${aucId} terminée.`);
}

let tradeCd = null;
function startFinalCountdown(tId) {
    if (tradeCd) return;
    let sec = 3;
    const status = document.getElementById('trade-status');
    tradeCd = setInterval(async () => {
        status.innerText = `ÉCHANGE DANS ${sec}s...`;
        if (sec <= 0) {
            clearInterval(tradeCd);
            tradeCd = null;
            // Un seul des deux déclenche la transaction (le premier dans l'alphabet)
            if (myUser.uid < tId.split('_').find(id => id !== myUser.uid)) {
                executeTradeTransaction(tId);
            }
        }
        sec--;
    }, 1000);
}

function stopFinalCountdown() {
    clearInterval(tradeCd);
    tradeCd = null;
    document.getElementById('trade-status').innerText = "";
}

async function executeTradeTransaction(tId) {
    const snap = await get(ref(db, `trades/${tId}`));
    const data = snap.val();
    if (!data || data.status !== "active") return;

    const uids = tId.split('_');
    const p1 = uids[0], p2 = uids[1];
    const off1 = data[p1], off2 = data[p2];

    const updates = {};
    
    const user1Snap = await get(ref(db, `users/${p1}`));
    const user2Snap = await get(ref(db, `users/${p2}`));
    const u1Data = user1Snap.val();
    const u2Data = user2Snap.val();

    // Verif fonds
    if (u1Data.coins < off1.coins || u2Data.coins < off2.coins) {
        showToast("Échange annulé : Fonds insuffisants.", "#e74c3c");
        await set(ref(db, `trades/${tId}`), null);
        return;
    }

    // Calcul monnaie
    updates[`users/${p1}/coins`] = u1Data.coins - off1.coins + off2.coins;
    updates[`users/${p2}/coins`] = u2Data.coins - off2.coins + off1.coins;

    // Échange zones
    if (off1.zoneId) {
        updates[`zones/${off1.zoneId}/ownerId`] = p2;
        updates[`zones/${off1.zoneId}/forSale`] = false;
    }
    if (off2.zoneId) {
        updates[`zones/${off2.zoneId}/ownerId`] = p1;
        updates[`zones/${off2.zoneId}/forSale`] = false;
    }

    // Nettoyage
    updates[`trades/${tId}`] = null;

    try {
        await update(ref(db), updates);
        showToast("🤝 Échange réussi !", "#2ecc71");
        writeLog('TRADE', `Échange finalisé entre ${off1.name} et ${off2.name}`);
    } catch (e) {
        console.error("Erreur transaction:", e);
    }
}

async function offlineIncomeCheck() {
    if (!myUser.uid || !myUser.lastIncomeTime) return;

    const now = Date.now();
    const diffMs = now - myUser.lastIncomeTime;
    
    if (diffMs >= INCOME_INTERVAL_MS) {
        const intervalsPassed = Math.floor(diffMs / INCOME_INTERVAL_MS);
        
        let myZones = Object.values(allZones).filter(z => z.ownerId === myUser.uid);
        
        if (myZones.length > 0) {
            let dailyIncome = myZones.reduce((acc, z) => acc + 2 + (((z.level||1) - 1) * 3), 0);
            let totalOfflineIncome = dailyIncome * intervalsPassed;

            if (totalOfflineIncome > 0) {
                 showToast(`💰 RÉCOLTE QUOTIDIENNE : +${totalOfflineIncome} pièces pour vos ${intervalsPassed} jour(s) de domination !`, "#e74c3c");
                
                const updates = {};
                updates[`users/${myUser.uid}/coins`] = (myUser.coins || 0) + totalOfflineIncome;
                updates[`users/${myUser.uid}/lastIncomeTime`] = now - (diffMs % INCOME_INTERVAL_MS); 
                
                await update(ref(db), updates);
            }
        }
    }
}

function startGPS() {
            if (!navigator.geolocation) return  showToast("GPS non supporté.", "#e74c3c");
            watchId = navigator.geolocation.watchPosition(
    (pos) => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        playerPos = { lat, lng };
        playerMarker.setLatLng([lat, lng]); 

        if (myUser.uid) {
            update(ref(db, `users/${myUser.uid}`), {
                lat: lat, lng: lng, lastSeen: Date.now()
            });
        }

        if (!isExploring) {
            const newZoneId = getZoneIdFromLatLng(lat, lng);
            if (newZoneId !== currentZoneId) {
                changeZone(newZoneId);
            }
        }
    }, 
 
                (err) => console.error(err),
                { enableHighAccuracy: true, maximumAge: 0 }
            );
        }

        function getZoneIdFromLatLng(lat, lng) {
            const latIdx = Math.floor(lat / GRID_STEP_LAT);
            const lngIdx = Math.floor(lng / GRID_STEP_LNG);
            return `${latIdx}_${lngIdx}`;
        }

        function getBoundsFromZoneId(zoneId) {
            const parts = zoneId.split('_');
            const latIdx = parseInt(parts[0]);
            const lngIdx = parseInt(parts[1]);
            return [
                [latIdx * GRID_STEP_LAT, lngIdx * GRID_STEP_LNG], 
                [(latIdx + 1) * GRID_STEP_LAT, (lngIdx + 1) * GRID_STEP_LNG] 
            ];
        }

function renderZonesMap() {
    if (isExploring) return; 

    Object.values(zoneRectangles).forEach(rect => map.removeLayer(rect));
    zoneRectangles = {};

    if (!playerPos) return;

    Object.keys(allZones).forEach(zId => {
        const zone = allZones[zId];
        if (zone.ownerId === myUser.uid) {
            createZoneRectangle(zId, zone);
        }
    });

    const pLatIdx = Math.floor(playerPos.lat / GRID_STEP_LAT);
    const pLngIdx = Math.floor(playerPos.lng / GRID_STEP_LNG);
    const range = 20; 

    for (let i = -range; i <= range; i++) {
        for (let j = -range; j <= range; j++) {
            const zId = `${pLatIdx + i}_${pLngIdx + j}`;
            if (zoneRectangles[zId]) continue;
            createZoneRectangle(zId, allZones[zId]);
        }
    }
}


function createZoneRectangle(zId, zone) {
    const bounds = getBoundsFromZoneId(zId);
    
    let style = {
        color: '#aaa',
        weight: 1,
        fillOpacity: 0.05,
        interactive: true
    };

    if (zone) {
        const owner = allUsers[zone.ownerId];
        const protection = getProtectionStatus(zone);
        
        style.color = owner ? owner.color : '#555';
        style.weight = zone.level ? zone.level * 2 : 2;
        style.fillOpacity = zone.forSale ? 0.6 : 0.3;
        
        if (zone.ownerId === myUser.uid) {
            style.weight = (zone.level || 1) * 3;
            style.fillOpacity = 0.5;
        }

        if (protection.active) {
            style.color = "#f1c40f"; 
            style.weight = (zone.level || 1) * 5; 
            style.dashArray = null; 
        } else if (zone.forSale) {
            style.dashArray = '5, 5'; 
        }
    }

    const rect = L.rectangle(bounds, style).addTo(map);
    zoneRectangles[zId] = rect;

    rect.on('click', (e) => {
        L.DomEvent.stopPropagation(e);
        selectZone(zId);
    });
}

        function captureTick() {
    const zone = allZones[currentZoneId];
            
    const protection = getProtectionStatus(zone);
    if (protection.active) {
        document.getElementById('capture-bar-fill').style.width = '0%';
        document.getElementById('capture-bar-fill').style.backgroundColor = '#95a5a6';
        document.getElementById('capture-text').innerText = "🛡️ ZONE PROTÉGÉE";
        return; 
    }        
            
    const isMine = zone && zone.ownerId === myUser.uid;
    
    if (isMine) {
        document.getElementById('capture-bar-fill').style.width = '100%';
        document.getElementById('capture-bar-fill').style.backgroundColor = '#2ecc71';
        document.getElementById('capture-text').innerText = "Territoire capturé";
        return;
    }

    let targetTime = TIME_FREE; 

    if (zone) {
        const lvl = zone.level || 1;
        if (lvl === 1) targetTime = 300;       // 5 min
        else if (lvl === 2) targetTime = 600;  // 10 min
        else if (lvl === 3) targetTime = 1200; // 20 min
        else if (lvl >= 4) targetTime = 1800;  // 30 min
    }

    captureTimer++;

    let percent = (captureTimer / targetTime) * 100;
    document.getElementById('capture-bar-fill').style.width = `${percent}%`;
    document.getElementById('capture-bar-fill').style.backgroundColor = zone ? '#e74c3c' : '#3498db';
    
    const minutes = Math.floor((targetTime - captureTimer) / 60);
    const seconds = Math.floor((targetTime - captureTimer) % 60);
    const timeString = `${minutes}:${seconds.toString().padStart(2, '0')}`;
    
    document.getElementById('capture-text').innerText = `Capture : ${timeString}`;

    if (captureTimer >= targetTime) {
        clearInterval(captureInterval);
        captureZone(currentZoneId, zone);
    }
}

async function checkEncirclement(newZoneId) {
    const parts = newZoneId.split('_');
    const lat = parseInt(parts[0]);
    const lng = parseInt(parts[1]);
    
    const range = 5; 
    const updates = {};
    let zonesConquered = 0;

    let minLat = lat, maxLat = lat, minLng = lng, maxLng = lng;

    for (let r = 1; r <= range; r++) {
        if (allZones[`${lat - r}_${lng}`]?.ownerId === myUser.uid) minLat = lat - r;
        if (allZones[`${lat + r}_${lng}`]?.ownerId === myUser.uid) maxLat = lat + r;
        if (allZones[`${lat}_${lng - r}`]?.ownerId === myUser.uid) minLng = lng - r;
        if (allZones[`${lat}_${lng + r}`]?.ownerId === myUser.uid) maxLng = lng + r;
        
        if (allZones[`${lat - r}_${lng - r}`]?.ownerId === myUser.uid) { minLat = lat - r; minLng = lng - r; }
        if (allZones[`${lat + r}_${lng + r}`]?.ownerId === myUser.uid) { maxLat = lat + r; maxLng = lng + r; }
    }

    if (minLat < lat && maxLat > lat && minLng < lng && maxLng > lng) {
        
        for (let i = minLat + 1; i < maxLat; i++) {
            for (let j = minLng + 1; j < maxLng; j++) {
                const targetId = `${i}_${j}`;
                
                if (targetId === newZoneId) continue;

                const targetZone = allZones[targetId];
                if (targetZone?.ownerId === myUser.uid) continue;

                let chance = 0;
                if (!targetZone || !targetZone.ownerId) {
                    chance = 0.10; 
                } else {
                    const protection = getProtectionStatus(targetZone);
                    if (!protection.active) {
                        chance = 0.04; 
                    }
                }

                if (Math.random() < chance) {
                    updates[`zones/${targetId}`] = {
                        ownerId: myUser.uid,
                        level: targetZone ? (targetZone.level || 1) : 1,
                        forSale: false
                    };
                    zonesConquered++;
                }
            }
        }
    }

    if (zonesConquered > 0) {
        await update(ref(db), updates);
        showToast(`💥 SIÈGE : ${zonesConquered} zones capturées par encerclement !`, "#9b59b6");
    }
}
    

async function captureZone(zoneId, existingZone) {

    }
    
    captureTimer = 0;

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function getUpgradeCost(currentLevel) {
            if (currentLevel === 1) return 50;
            if (currentLevel === 2) return 75;
            if (currentLevel === 3) return 100;
            return null; 
        }

            updates[`zones/${zoneId}/level`] = currentLevel + 1;
            updateQuestProgress('upgrade');

                
            await update(ref(db), updates);
            writeLog('UPGRADE', `A amélioré la zone ${zoneId} au niveau ${currentLevel + 1} (Coût: ${cost}💰)`);

            updates[`zones/${zoneId}/forSale`] = isForSale;
            updates[`zones/${zoneId}/price`] = price;
            await update(ref(db), updates);
        }

        async function buyZone(zoneId, zoneData) {
            if (myUser.coins < zoneData.price) return;

            const updates = {};
            updates[`users/${myUser.uid}/coins`] = myUser.coins - zoneData.price;
            updates[`users/${myUser.uid}/zonesCount`] = (myUser.zonesCount || 0) + 1;
            
            const seller = allUsers[zoneData.ownerId];
            if (seller) {
                updates[`users/${zoneData.ownerId}/coins`] = (seller.coins || 0) + zoneData.price;
                updates[`users/${zoneData.ownerId}/zonesCount`] = Math.max(0, (seller.zonesCount || 1) - 1);
            }

            updates[`zones/${zoneId}/ownerId`] = myUser.uid;
            updates[`zones/${zoneId}/forSale`] = false;
            updates[`zones/${zoneId}/price`] = 0;

            await update(ref(db), updates);
            showToast("Zone achetée avec succès !", "#e74c3c");
            writeLog('SHOP', `A acheté la zone ${zoneId} à ${allUsers[zoneData.ownerId]?.username || 'quelqu\'un'} pour ${zoneData.price}💰`);
        }

        async function collectIncome() {
            let myZones = Object.values(allZones).filter(z => z.ownerId === myUser.uid);
            if (myZones.length === 0) return;

            let income = 0;
            myZones.forEach(z => {

            });

            const updates = {};
            updates[`users/${myUser.uid}/coins`] = myUser.coins + income;
            updates[`users/${myUser.uid}/lastIncomeTime`] = Date.now();
            
            await update(ref(db), updates);
        }

async function protectZone(zoneId, plan) {
    if (myUser.coins < plan.cost) {
         showToast("Pas assez de pièces !", "#e74c3c");
        return;
    }

    const now = Date.now();
    const currentExpiry = (allZones[zoneId] && allZones[zoneId].protectionExpiry) || now;
    const baseTime = Math.max(now, currentExpiry);
    const newExpiry = baseTime + plan.duration;

    const updates = {};
    updates[`users/${myUser.uid}/coins`] = myUser.coins - plan.cost;
    updates[`zones/${zoneId}/protectionExpiry`] = newExpiry;

    await update(ref(db), updates);
     showToast(`Bouclier activé jusqu'au ${new Date(newExpiry).toLocaleDateString()} !`, "#e74c3c");
}

function getProtectionStatus(zone) {
    if (!zone || !zone.protectionExpiry) return { active: false };
    const remaining = zone.protectionExpiry - Date.now();
    return {
        active: remaining > 0,
        remaining: remaining,
        date: new Date(zone.protectionExpiry).toLocaleString()
    };
}

async function checkQuests() {
    const snap = await get(ref(db, `users/${myUser.uid}/quests`));
    let userQuests = snap.val() || {};
    const now = Date.now();
    let needUpdate = false;

    if (!userQuests.q1 || now > userQuests.q1.expiry) {
        const target = Math.floor(Math.random() * 9) + 2; 
        userQuests.q1 = { type: 'capture', target, current: 0, reward: target * 3, expiry: now + 86400000, label: `Conquérir ${target} zones` };
        needUpdate = true;
    }

    if (!userQuests.q2 || now > userQuests.q2.expiry) {
        const target = Math.floor(Math.random() * 5) + 1; 
        userQuests.q2 = { type: 'steal', target, current: 0, reward: target * 5, expiry: now + 86400000, label: `Voler ${target} zones à l'ennemi` };
        needUpdate = true;
    }

    if (!userQuests.q3 || now > userQuests.q3.expiry) {
        userQuests.q3 = { type: 'upgrade', target: 1, current: 0, reward: 10, expiry: now + 172800000, label: "Améliorer 1 territoire" };
        needUpdate = true;
    }

    if (needUpdate) await update(ref(db, `users/${myUser.uid}/quests`), userQuests);
}

async function renderQuests() {
    await checkQuests(); 
    const snap = await get(ref(db, `users/${myUser.uid}/quests`));
    const quests = snap.val();
    const container = document.getElementById('quests-container');
    
    if (!quests) {
        container.innerHTML = "<p style='text-align:center; color:#666;'>Génération des missions...</p>";
        return;
    }

    container.innerHTML = ""; 

    Object.keys(quests).forEach(key => {
        const q = quests[key];
        const isDone = q.current >= q.target;
        const progressPercent = Math.min(100, (q.current / q.target) * 100);
        
        const card = document.createElement('div');
        card.style.cssText = `
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid ${isDone ? '#2ecc71' : '#333'}; 
            margin-bottom: 10px;
            transition: all 0.3s;
        `;
        
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <span style="font-weight:bold; color: ${isDone ? '#2ecc71' : '#fff'};">
                    ${isDone ? '✅' : '⚔️'} ${q.label}
                </span>
                <span style="color:#f1c40f; font-weight:bold;">+${q.reward}💰</span>
            </div>

            <div style="background:#000; height:12px; border-radius:6px; overflow:hidden; border: 1px solid #333;">
                <div style="width:${progressPercent}%; background:${isDone ? '#2ecc71' : '#3498db'}; height:100%; transition: width 0.5s ease-out;"></div>
            </div>

            <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:#aaa; margin-top:8px;">
                <span style="font-family: monospace;">Progression: [${q.current}/${q.target}]</span>
                <span>${Math.floor(progressPercent)}%</span>
            </div>
        `;
        container.appendChild(card);
    });
}


async function updateQuestProgress(type) {
    const snap = await get(ref(db, `users/${myUser.uid}/quests`));
    if (!snap.exists()) return;
    
    const quests = snap.val();
    let hasChanged = false;
    
    for (let key in quests) {
        let q = quests[key];
        if (q.type === type && q.current < q.target) {
            q.current += 1;
            hasChanged = true;

            if (q.current >= q.target) {
                showToast(`🏆 Quête terminée : ${q.label} ! (+${q.reward}💰)`, "#2ecc71");
                myUser.coins += q.reward; 
                await update(ref(db, `users/${myUser.uid}`), { coins: myUser.coins });
            }
        }
    }

    if (hasChanged) {
        await update(ref(db, `users/${myUser.uid}/quests`), quests);
        if (!document.getElementById('quests-screen').classList.contains('hidden')) {
            renderQuests();
        }
    }
}
